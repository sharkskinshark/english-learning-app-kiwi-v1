<!DOCTYPE html>
<html>
<head>
    <title>Events Test</title>
</head>
<body>
    <h1>Events Test</h1>
    <button onclick="testEvents()">Test Events Object</button>
    <div id="output"></div>

    <script src="events.js"></script>
    <script>
        function testEvents() {
            const output = document.getElementById('output');
            if (typeof EVENTS === 'undefined') {
                output.innerHTML = '<p style="color: red;">ERROR: EVENTS object not found!</p>';
                return;
            }
            
            const keys = Object.keys(EVENTS);
            output.innerHTML = `
                <h2>EVENTS Object Test</h2>
                <p><strong>Total Events:</strong> ${keys.length}</p>
                <p><strong>Available Events:</strong> ${keys.join(', ')}</p>
                <hr>
                <h3>Event Details:</h3>
            `;
            
            keys.forEach(key => {
                const event = EVENTS[key];
                output.innerHTML += `
                    <p><strong>${key}:</strong> ${event.name} (${event.period.start} to ${event.period.end})</p>
                `;
            });
        }
    </script>
</body>
</html>
