  <script>
    // 🔓 UNLOCK SYSTEM FOR TESTING ANIMATIONS
    let isAnimationUnlocked = false;
    let unlockTimeout = null;
    
    function toggleAnimationUnlock() {
      isAnimationUnlocked = !isAnimationUnlocked;
      const unlockBtn = document.getElementById('btn-unlock');
      
      if (isAnimationUnlocked) {
        unlockBtn.innerHTML = '🔒 Lock Animations';
        unlockBtn.style.background = 'linear-gradient(45deg, #32CD32, #98FB98)';
        alert('🔓 Animation restrictions temporarily unlocked! You can now test all holiday animations regardless of date.');
        console.log('🔓 Animation unlock activated - all holiday restrictions bypassed');
      } else {
        unlockBtn.innerHTML = '🔓 Unlock Animations';
        unlockBtn.style.background = 'linear-gradient(45deg, #FF4500, #FF8C00)';
        alert('🔒 Animation restrictions locked. Animations will only work during holiday periods.');
        console.log('🔒 Animation unlock deactivated - holiday restrictions restored');
      }
    }
    
    function autoLockAfterAnimation(duration = 8000) {
      if (isAnimationUnlocked) {
        console.log(`🔄 Auto-lock scheduled in ${duration/1000} seconds...`);
        if (unlockTimeout) clearTimeout(unlockTimeout);
        unlockTimeout = setTimeout(() => {
          if (isAnimationUnlocked) {
            console.log('🔒 Auto-locking animations after animation completion');
            toggleAnimationUnlock();
          }
        }, duration);
      }
    }
    
    // Enhanced holiday checking that respects unlock status
    function isHolidayActiveOrUnlocked(holidayId) {
      if (isAnimationUnlocked) {
        console.log(`🔓 Holiday check bypassed for ${holidayId} (unlocked mode)`);
        return true;
      }
      return isHolidayActive(holidayId);
    }
    
    function testChristmasAnimation() {
      console.log('🎅 Christmas button clicked!');
      
      // Check if Christmas is currently active or unlocked
      if (!isHolidayActiveOrUnlocked('christmas')) {
        const message = getHolidayMessage('christmas');
        alert(message + '\n\n💡 Tip: Use "🔓 Unlock Animations" button to test animations outside holiday periods!');
        return;
      }
      
      if (isAnimationUnlocked) {
        alert('🎄 Christmas Animation Test! (🔓 Unlocked Mode - Animation will auto-lock after completion)');
        autoLockAfterAnimation(8000); // Christmas animation is 8 seconds
      } else {
        alert('🎄 Christmas Animation Test! (Holiday is currently active)');
      }
      
      const loader = document.createElement('div');
      loader.className = 'christmas-loader active';
      loader.innerHTML = '<div class="christmas-sky"><div class="santa-sleigh-scene"><div class="reindeer reindeer-1">🦌</div><div class="reindeer reindeer-2">🦌</div><div class="reindeer reindeer-3">🦌</div><div class="santa-sleigh">🎅🛷</div><div class="sleigh-trail">✨</div></div><div class="snow-container"><div class="snowflake snow-1">❄️</div><div class="snowflake snow-2">❄️</div><div class="snowflake snow-3">❄️</div><div class="snowflake snow-4">❄️</div><div class="snowflake snow-5">❄️</div><div class="snowflake snow-6">❄️</div><div class="snowflake snow-7">❄️</div><div class="snowflake snow-8">❄️</div><div class="snowflake snow-9">❄️</div><div class="snowflake snow-10">❄️</div><div class="snowflake snow-11">❄️</div><div class="snowflake snow-12">❄️</div><div class="snowflake snow-13">❄️</div><div class="snowflake snow-14">❄️</div><div class="snowflake snow-15">❄️</div><div class="snowflake snow-16">❄️</div><div class="snowflake snow-17">❄️</div><div class="snowflake snow-18">❄️</div><div class="snowflake snow-19">❄️</div><div class="snowflake snow-20">❄️</div><div class="snowflake snow-21">❄️</div><div class="snowflake snow-22">❄️</div><div class="snowflake snow-23">❄️</div><div class="snowflake snow-24">❄️</div><div class="snowflake snow-25">❄️</div><div class="snowflake snow-26">❄️</div><div class="snowflake snow-27">❄️</div><div class="snowflake snow-28">❄️</div><div class="snowflake snow-29">❄️</div><div class="snowflake snow-30">❄️</div><div class="snowflake snow-31">❄️</div><div class="snowflake snow-32">❄️</div><div class="snowflake snow-33">❄️</div><div class="snowflake snow-34">❄️</div><div class="snowflake snow-35">❄️</div><div class="snowflake snow-36">❄️</div></div><div class="gifts-container"><div class="flying-gift gift-1">🎁</div><div class="flying-gift gift-2">🧸</div><div class="flying-gift gift-3">📦</div><div class="flying-gift gift-4">🎀</div><div class="flying-gift gift-5">🪀</div><div class="flying-gift gift-6">🎮</div><div class="flying-gift gift-7">🎁</div><div class="flying-gift gift-8">🧸</div><div class="flying-gift gift-9">📦</div><div class="flying-gift gift-10">�</div><div class="flying-gift gift-11">🪀</div><div class="flying-gift gift-12">�🎮</div></div><div class="trees-container"><div class="christmas-tree tree-1">🎄<span class="tree-star">⭐</span></div><div class="christmas-tree tree-2">🎄</div><div class="christmas-tree tree-3">🎄<span class="tree-star">⭐</span></div><div class="christmas-tree tree-4">🎄</div><div class="christmas-tree tree-5">🎄<span class="tree-star">⭐</span></div><div class="christmas-tree tree-6">🎄</div></div><div class="christmas-stars"><div class="star star-1">⭐</div><div class="star star-2">🌟</div><div class="star star-3">⭐</div><div class="star star-4">🌟</div></div><div class="christmas-center-text">🎅 Santa is Coming!</div></div>';
      
      document.body.appendChild(loader);
      
      // Christmas firework emojis
      const christmasEmojis = ['🎄', '🎅', '⭐', '🌟', '❄️', '🎁', '🔔', '🕯️', '🧦', '🎀', '✨', '💫'];
      
      // Create Christmas firework bursts
      let burstCount = 0;
      const maxBursts = 8;
      
      const createChristmasFirework = () => {
        if (burstCount >= maxBursts) return;
        
        const particleCount = 18 + Math.floor(Math.random() * 12);
        console.log(`Creating ${particleCount} particles for burst ${burstCount + 1}`);
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.textContent = christmasEmojis[Math.floor(Math.random() * christmasEmojis.length)];
          
          // Set basic styles directly
          particle.style.position = 'absolute';
          particle.style.fontSize = '32px';
          particle.style.zIndex = '100000';
          particle.style.pointerEvents = 'none';
          
          // Random angle and distance
          const angle = Math.random() * 360;
          const radian = (angle * Math.PI) / 180;
          const distance = 200 + Math.random() * 400;
          
          // Calculate start and end positions
          const centerX = window.innerWidth / 2;
          const centerY = window.innerHeight / 2;
          const finalX = centerX + Math.cos(radian) * distance;
          const finalY = centerY + Math.sin(radian) * distance;
          
          // Set initial position at center
          particle.style.left = centerX + 'px';
          particle.style.top = centerY + 'px';
          particle.style.opacity = '1';
          particle.style.transform = 'scale(0.5)';
          
          loader.appendChild(particle);
          console.log(`Particle ${i}: from (${centerX}, ${centerY}) to (${finalX}, ${finalY})`);
          
          // Animate using requestAnimationFrame for better control
          setTimeout(() => {
            particle.style.transition = 'all 2s ease-out';
            particle.style.left = finalX + 'px';
            particle.style.top = finalY + 'px';
            particle.style.transform = 'scale(1) rotate(360deg)';
            particle.style.opacity = '0';
            
            console.log(`Animating particle ${i} to (${finalX}, ${finalY})`);
          }, Math.random() * 100);
          
          // Clean up
          setTimeout(() => {
            if (particle && particle.parentNode) {
              particle.parentNode.removeChild(particle);
            }
          }, 2200);
        }
        
        burstCount++;
        console.log(`🎆 Christmas firework burst ${burstCount}/${maxBursts}!`);
        if (burstCount < maxBursts) {
          setTimeout(createChristmasFirework, 700);
        }
      };
      
      const sleigh = loader.querySelector('.santa-sleigh-scene');
      const stars = loader.querySelectorAll('.star');
      const snow = loader.querySelectorAll('.snowflake');
      const gifts = loader.querySelectorAll('.flying-gift');
      const trees = loader.querySelectorAll('.christmas-tree');
      
      setTimeout(() => { sleigh.classList.add('flying'); }, 100);
      setTimeout(() => { createChristmasFirework(); }, 300);
      setTimeout(() => { trees.forEach((t, i) => setTimeout(() => t.classList.add('growing'), i * 150)); }, 500);
      setTimeout(() => { stars.forEach(s => s.classList.add('twinkle')); }, 1000);
      setTimeout(() => { snow.forEach((s, i) => setTimeout(() => s.classList.add('falling'), i * 100)); }, 2000);
      setTimeout(() => { gifts.forEach((g, i) => setTimeout(() => g.classList.add('dropping'), i * 200)); }, 2500);
      
      setTimeout(() => {
        if (loader.parentNode) loader.parentNode.removeChild(loader);
        console.log('✅ Christmas animation complete');
      }, 8000);
    }
    
    function testNewYearAnimation() {
      console.log('🎆 Starting New Year Firework Animation Simulation...');
      
      // Check if New Year is currently active or unlocked
      if (!isHolidayActiveOrUnlocked('newyear')) {
        const message = getHolidayMessage('newyear');
        alert(message + '\n\n💡 Tip: Use "🔓 Unlock Animations" button to test animations outside holiday periods!');
        return;
      }
      
      if (isAnimationUnlocked) {
        alert('🎆 New Year Animation Test! (🔓 Unlocked Mode - Animation will auto-lock after completion)');
        autoLockAfterAnimation(7000); // New Year animation is 7 seconds
      } else {
        alert('🎆 New Year Animation Test! (Holiday is currently active)');
      }
      
      // Create New Year loader with dynamic background
      const newYearLoader = document.createElement('div');
      newYearLoader.className = 'newyear-loader active';
      newYearLoader.innerHTML = `
        <!-- New Year Message -->
        <div class="newyear-center-text">🎉 Happy New Year 2026! 🎆</div>
      `;
      
      document.body.appendChild(newYearLoader);
      
      // New Year firework emojis
      const fireworkEmojis = ['🎆', '🎇', '✨', '🌟', '💫', '🎊', '🎉', '⭐', '🔥', '💥'];
      
      // Hide main content during animation
      const mainContent = document.getElementById('mainContent');
      if (mainContent) {
        mainContent.style.opacity = '0';
        mainContent.style.visibility = 'hidden';
      }
      
      // Add new-year-active class to body
      document.body.classList.add('newyear-active');
      
      // Show center text immediately
      const centerText = newYearLoader.querySelector('.newyear-center-text');
      setTimeout(() => {
        centerText.classList.add('show');
      }, 100);
      
      // Create firework bursts every 800ms for 7 seconds
      let burstCount = 0;
      const maxBursts = 8; // 8 bursts over 7 seconds
      
      // Create 4 random edge fireworks with different timing
      const createRandomEdgeFirework = (fireworkIndex) => {
        console.log(`🎆 Creating random edge firework #${fireworkIndex + 1}`);
        
        // Random edge positions (avoid center area)
        const edges = [
          { x: Math.random() * 0.3 * window.innerWidth, y: Math.random() * 0.4 * window.innerHeight }, // Top-left
          { x: 0.7 * window.innerWidth + Math.random() * 0.3 * window.innerWidth, y: Math.random() * 0.4 * window.innerHeight }, // Top-right
          { x: Math.random() * 0.4 * window.innerWidth, y: 0.6 * window.innerHeight + Math.random() * 0.4 * window.innerHeight }, // Bottom-left
          { x: 0.6 * window.innerWidth + Math.random() * 0.4 * window.innerWidth, y: 0.6 * window.innerHeight + Math.random() * 0.4 * window.innerHeight } // Bottom-right
        ];
        
        const launchPoint = edges[fireworkIndex];
        const particleCount = 8 + Math.floor(Math.random() * 6); // 8-13 particles per edge firework
        
        for (let i = 0; i < particleCount; i++) {
          const firework = document.createElement('div');
          firework.textContent = fireworkEmojis[Math.floor(Math.random() * fireworkEmojis.length)];
          
          // Set basic styles directly with responsive sizing  
          firework.style.position = 'absolute';
          firework.style.fontSize = Math.max(20, Math.min(28, window.innerWidth * 0.02)) + 'px'; // 2vw clamped 20-28px
          firework.style.zIndex = '100000';
          firework.style.pointerEvents = 'none';
          
          // Calculate angle for radial burst from edge position
          const angle = Math.random() * 360;
          const radian = (angle * Math.PI) / 180;
          
          // Smaller responsive distance for edge fireworks
          const baseDistance = Math.min(window.innerWidth, window.innerHeight) * 0.2; // 20% of smaller dimension
          const distance = baseDistance + Math.random() * (baseDistance * 0.6); // 20%-32% of smaller dimension
          
          const finalX = launchPoint.x + Math.cos(radian) * distance;
          const finalY = launchPoint.y + Math.sin(radian) * distance;
          
          // Set initial position at edge launch point
          firework.style.left = launchPoint.x + 'px';
          firework.style.top = launchPoint.y + 'px';
          firework.style.opacity = '1';
          firework.style.transform = 'scale(0.2)';
          
          newYearLoader.appendChild(firework);
          console.log(`Edge Firework ${fireworkIndex + 1} Particle ${i}: from (${launchPoint.x}, ${launchPoint.y}) to (${finalX}, ${finalY})`);
          
          // Trigger animation with slight delay
          setTimeout(() => {
            firework.style.transition = 'all 2.0s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            firework.style.left = finalX + 'px';
            firework.style.top = finalY + 'px';
            firework.style.transform = 'scale(1.0) rotate(360deg)';
            firework.style.opacity = '0';
          }, i * 15); // Faster stagger for edge fireworks
          
          // Remove particle after animation
          setTimeout(() => {
            if (firework && firework.parentNode) {
              firework.parentNode.removeChild(firework);
            }
          }, 2200);
        }
      };

      const createFireworkBurst = () => {
        if (burstCount >= maxBursts) return;
        
        // Create 15-25 firework particles per burst for spectacular effect
        const particleCount = 15 + Math.floor(Math.random() * 10);
        console.log(`Creating ${particleCount} New Year particles for burst ${burstCount + 1}`);
        
        for (let i = 0; i < particleCount; i++) {
          const firework = document.createElement('div');
          firework.textContent = fireworkEmojis[Math.floor(Math.random() * fireworkEmojis.length)];
          
          // Set basic styles directly with responsive sizing
          firework.style.position = 'absolute';
          firework.style.fontSize = Math.max(24, Math.min(32, window.innerWidth * 0.025)) + 'px'; // 2.5vw clamped 24-32px
          firework.style.zIndex = '100000';
          firework.style.pointerEvents = 'none';
          
          // Calculate angle for even distribution in all directions
          const angle = Math.random() * 360;
          const radian = (angle * Math.PI) / 180;
          
          // Distance from center - responsive to screen size
          const baseDistance = Math.min(window.innerWidth, window.innerHeight) * 0.3; // 30% of smaller dimension
          const distance = baseDistance + Math.random() * (baseDistance * 0.8); // 30%-54% of smaller dimension
          
          // Calculate start and end positions
          const centerX = window.innerWidth / 2;
          const centerY = window.innerHeight / 2;
          const finalX = centerX + Math.cos(radian) * distance;
          const finalY = centerY + Math.sin(radian) * distance;
          
          // Set initial position at center
          firework.style.left = centerX + 'px';
          firework.style.top = centerY + 'px';
          firework.style.opacity = '1';
          firework.style.transform = 'scale(0.3)';
          
          newYearLoader.appendChild(firework);
          console.log(`NY Particle ${i}: from (${centerX}, ${centerY}) to (${finalX}, ${finalY})`);
          
          // Trigger animation with slight delay for wave effect
          setTimeout(() => {
            firework.style.transition = 'all 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            firework.style.left = finalX + 'px';
            firework.style.top = finalY + 'px';
            firework.style.transform = 'scale(1.2) rotate(360deg)';
            firework.style.opacity = '0';
            
            console.log(`Animating NY particle ${i} to (${finalX}, ${finalY})`);
          }, i * 20); // Stagger by 20ms for ripple effect
          
          // Remove particle after animation
          setTimeout(() => {
            if (firework && firework.parentNode) {
              firework.parentNode.removeChild(firework);
            }
          }, 2700);
        }
        
        burstCount++;
        console.log(`🎆 Firework burst ${burstCount}/${maxBursts} launched!`);
        
        // Schedule next burst
        if (burstCount < maxBursts) {
          setTimeout(createFireworkBurst, 800);
        }
      };
      
      // Start first firework burst after 500ms
      setTimeout(createFireworkBurst, 500);
      
      // Launch 4 random edge fireworks at different times throughout 7-second animation
      setTimeout(() => createRandomEdgeFirework(0), 1200);  // Top-left at 1.2s
      setTimeout(() => createRandomEdgeFirework(1), 2800);  // Top-right at 2.8s  
      setTimeout(() => createRandomEdgeFirework(2), 4200);  // Bottom-left at 4.2s
      setTimeout(() => createRandomEdgeFirework(3), 5600);  // Bottom-right at 5.6s
      
      console.log('🎆 Scheduled 4 random edge fireworks at different timings!');

      // Complete animation and cleanup (5 seconds total)

    function speakWord(word, meaning) {
      const utterance = new SpeechSynthesisUtterance(word);
      
      // Device detection
      const isIPhone = /iPhone/i.test(navigator.userAgent);
      const isIPad = /iPad/i.test(navigator.userAgent);
      const isAndroid = /Android/i.test(navigator.userAgent);
      
      // British female voice priority
      const voices = speechSynthesis.getVoices();
      const britishFemale = voices.find(v => 
        (v.name.includes('Moira') || v.name.includes('Victoria') || v.name.includes('Fiona') || 
         v.name.includes('Female') && v.lang.includes('en-GB')) && 
        (v.name.includes('Female') || v.name.includes('Premium'))
      );
      
      if (britishFemale) {
        utterance.voice = britishFemale;
      }
      
      // Device-specific settings
      if (isIPhone || isIPad) {
        utterance.rate = 0.75;
        utterance.pitch = 1.0;
      } else if (isAndroid) {
        utterance.rate = 0.8;
        utterance.pitch = 1.05;
      } else {
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
      }
      
      utterance.volume = 1.0;
      utterance.lang = 'en-GB';
      
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
      
      console.log(`🔊 Speaking: ${word}`);
    }
    
    function createVocabDisplay(words, title, color) {
      // Remove any existing vocab display
      const existing = document.getElementById('vocab-display');
      if (existing) existing.remove();
      
      // Create vocab display container
      const display = document.createElement('div');
      display.id = 'vocab-display';
      display.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 3px solid ${color};
        border-radius: 20px;
        padding: 30px;
        max-width: 600px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        z-index: 999999;
      `;
      
      // Title
      const titleEl = document.createElement('h2');
      titleEl.textContent = title;
      titleEl.style.cssText = `
        text-align: center;
        color: ${color};
        margin-bottom: 20px;
        font-size: 24px;
      `;
      display.appendChild(titleEl);
      
      // Word list
      const wordList = document.createElement('div');
      words.forEach((item, index) => {
        const wordDiv = document.createElement('div');
        wordDiv.style.cssText = `
          display: flex;
          align-items: center;
          padding: 12px;
          margin-bottom: 10px;
          background: #f8f9fa;
          border-radius: 10px;
          cursor: pointer;
          transition: background 0.2s;
        `;
        wordDiv.onmouseover = () => wordDiv.style.background = '#e9ecef';
        wordDiv.onmouseout = () => wordDiv.style.background = '#f8f9fa';
        wordDiv.onclick = () => speakWord(item.word, item.meaning);
        
        wordDiv.innerHTML = `
          <span style="font-size: 24px; margin-right: 10px;">${item.emoji}</span>
          <span style="font-size: 20px; margin-right: 8px;">🔊</span>
          <div style="flex: 1;">
            <strong style="font-size: 18px; color: #333;">${item.word}</strong>
            <div style="font-size: 14px; color: #666; margin-top: 4px;">${item.meaning}</div>
          </div>
        `;
        
        wordList.appendChild(wordDiv);
      });
      display.appendChild(wordList);
      
      // Close button
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '✖ Close';
      closeBtn.style.cssText = `
        display: block;
        margin: 20px auto 0;
        padding: 10px 30px;
        background: ${color};
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      `;
      closeBtn.onclick = () => display.remove();
      display.appendChild(closeBtn);
      
      document.body.appendChild(display);
      
      // Load voices
      if (speechSynthesis.getVoices().length === 0) {
        speechSynthesis.addEventListener('voiceschanged', () => {}, { once: true });
      }
    }

        <div class="thanksgiving-emoji" data-emoji="🌽" data-corner="center-left">🌽</div>
        <div class="thanksgiving-emoji" data-emoji="🍁" data-corner="center-right">🍁</div>
        <div class="thanksgiving-emoji" data-emoji="🏡" data-corner="bottom-left">🏡</div>
        <div class="thanksgiving-emoji" data-emoji="❤️" data-corner="bottom-right">❤️</div>
        <div class="thanksgiving-center-text">🦃 Grateful Hearts! 🍂</div>
      `;
      document.body.appendChild(thanksgivingLoader);
      
      // Create larger random feast icons
      const feastFoods = ['🦃', '🥧', '🌽', '🍽️', '🥖', '🧄', '🥕', '🍷', '🍂', '🍁', '🎃', '🌾', '🥗', '🍯', '🥜'];
      
      // Track occupied positions to avoid overlapping
      const occupiedPositions = [];
      
      const createRandomFeastIcon = () => {
        const feastIcon = document.createElement('div');
        feastIcon.className = 'thanksgiving-large-icon';
        feastIcon.textContent = feastFoods[Math.floor(Math.random() * feastFoods.length)];
        
        // Define safe zones around the feast table (avoid center area)
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const tableRadius = Math.min(window.innerWidth, window.innerHeight) * 0.3; // Increased for 50% table size
        const minDistance = 120; // Minimum distance between icons
        
        let attempts = 0;
        let validPosition = false;
        let finalX, finalY;
        
        while (!validPosition && attempts < 20) {
          // Generate position in a ring around the center (avoiding the table)
          const angle = Math.random() * 2 * Math.PI;
          const distance = tableRadius + 120 + Math.random() * 300; // Increased buffer for 50% table size
          
          finalX = centerX + Math.cos(angle) * distance;
          finalY = centerY + Math.sin(angle) * distance;
          
          // Ensure position is within screen bounds with margin
          finalX = Math.max(60, Math.min(window.innerWidth - 60, finalX));
          finalY = Math.max(60, Math.min(window.innerHeight - 60, finalY));
          
          // Check distance from other icons
          validPosition = true;
          for (const pos of occupiedPositions) {
            const dist = Math.sqrt(Math.pow(finalX - pos.x, 2) + Math.pow(finalY - pos.y, 2));
            if (dist < minDistance) {
              validPosition = false;
              break;
            }
          }
          
          attempts++;
        }
        
        // If we couldn't find a valid position, use a grid-based approach
        if (!validPosition) {
          const gridSize = 150;
          const cols = Math.floor(window.innerWidth / gridSize);
          const rows = Math.floor(window.innerHeight / gridSize);
          const totalCells = cols * rows;
          const randomCell = Math.floor(Math.random() * totalCells);
          
          const col = randomCell % cols;
          const row = Math.floor(randomCell / cols);
          
          finalX = col * gridSize + gridSize / 2;
          finalY = row * gridSize + gridSize / 2;
          
          // Avoid center area in grid approach too
          const distFromCenter = Math.sqrt(Math.pow(finalX - centerX, 2) + Math.pow(finalY - centerY, 2));
          if (distFromCenter < tableRadius + 90) {
            // Push to edge if too close to center
            const pushAngle = Math.atan2(finalY - centerY, finalX - centerX);
            finalX = centerX + Math.cos(pushAngle) * (tableRadius + 140);
            finalY = centerY + Math.sin(pushAngle) * (tableRadius + 140);
          }
        }
        
        // Record this position
        occupiedPositions.push({ x: finalX, y: finalY });
        
        // Remove old positions to keep array manageable
        if (occupiedPositions.length > 8) {
          occupiedPositions.shift();
        }
        
        // Random starting position from edge
        const side = Math.floor(Math.random() * 4);
        let startX, startY;
        
        switch(side) {
          case 0: // Top
            startX = Math.random() * window.innerWidth;
            startY = -100;
            break;
          case 1: // Right
            startX = window.innerWidth + 100;
            startY = Math.random() * window.innerHeight;
            break;
          case 2: // Bottom
            startX = Math.random() * window.innerWidth;
            startY = window.innerHeight + 100;
            break;
          case 3: // Left
            startX = -100;
            startY = Math.random() * window.innerHeight;
            break;
        }
        
        feastIcon.style.left = startX + 'px';
        feastIcon.style.top = startY + 'px';
        thanksgivingLoader.appendChild(feastIcon);
        
        // Animate to final position with proper spacing
        setTimeout(() => {
          feastIcon.style.transition = 'all 2.5s ease-out';
          feastIcon.style.left = finalX + 'px';
          feastIcon.style.top = finalY + 'px';
          feastIcon.style.transform = 'scale(1) rotate(360deg)';
          feastIcon.style.opacity = '0.9';
        }, 100);
        
        // Remove after animation
        setTimeout(() => {
          if (feastIcon && feastIcon.parentNode) {
            feastIcon.parentNode.removeChild(feastIcon);
          }
        }, 3000);
      };
      
      setTimeout(() => {
        const centerText = thanksgivingLoader.querySelector('.thanksgiving-center-text');
        centerText.classList.add('show');
      }, 500);
      
      // Animate feast table
      setTimeout(() => {
        const feastTable = thanksgivingLoader.querySelector('.thanksgiving-feast-table');
        feastTable.classList.add('feast-appear');
        
        // Apply random scaling and dancing effects to each feast dish
        const feastDishes = feastTable.querySelectorAll('.feast-dish');
        feastDishes.forEach((dish, index) => {
          // Generate random scale factor between 0.8 and 1.6
          const randomScale = 0.8 + Math.random() * 0.8;
          // Generate random animation delay for staggered dancing
          const randomDelay = Math.random() * 2;
          
          // Apply random scale and staggered animation
          dish.style.setProperty('--random-scale', randomScale);
          dish.style.animationDelay = `1s, ${3 + randomDelay}s`;
          
          // Add random dancing class for variety
          setTimeout(() => {
            if (Math.random() > 0.5) {
              dish.classList.add('feast-dance-wild');
            }
          }, 2000 + index * 100);
        });
      }, 800);
      
      const thanksgivingEmojis = thanksgivingLoader.querySelectorAll('.thanksgiving-emoji');
      thanksgivingEmojis.forEach((emoji, index) => {
        setTimeout(() => {
          emoji.style.display = 'block';
          emoji.classList.add('harvest-bounce');
          const emojiChar = emoji.textContent;
          if (emojiChar === '🦃') emoji.classList.add('turkey-strut');
          else if (emojiChar === '🥧' || emojiChar === '🌽') emoji.classList.add('feast-glow');
        }, index * 200);
      });
      
      // Create random feast icons at intervals
      const iconInterval = setInterval(() => {
        createRandomFeastIcon();
      }, 1200); // Increased interval to 1.2 seconds for better spacing
      
      setTimeout(() => {
        clearInterval(iconInterval);
        thanksgivingLoader.classList.add('fade-out');
        setTimeout(() => {
          document.body.removeChild(thanksgivingLoader);
          console.log('🦃 Thanksgiving animation completed!');
        }, 1000);
      }, 6000);
    }

      // Create birthday firework bursts

        if (burstCount >= maxBursts) return;

        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.textContent = birthdayEmojis[Math.floor(Math.random() * birthdayEmojis.length)];
          
          particle.style.position = 'absolute';
          particle.style.fontSize = '28px';
          particle.style.zIndex = '100000';
          particle.style.pointerEvents = 'none';
          
          const angle = Math.random() * 360;
          const radian = (angle * Math.PI) / 180;
          const distance = 150 + Math.random() * 300;
          
          const centerX = window.innerWidth / 2;
          const centerY = window.innerHeight / 2;
          const finalX = centerX + Math.cos(radian) * distance;
          const finalY = centerY + Math.sin(radian) * distance;
          
          particle.style.left = centerX + 'px';
          particle.style.top = centerY + 'px';
          particle.style.opacity = '1';
          particle.style.transform = 'scale(0.5)';
          
          birthdayLoader.appendChild(particle);
          
          setTimeout(() => {
            particle.style.transition = 'all 1.8s ease-out';
            particle.style.left = finalX + 'px';
            particle.style.top = finalY + 'px';
            particle.style.transform = 'scale(1) rotate(360deg)';
            particle.style.opacity = '0';
          }, Math.random() * 100);
          
          setTimeout(() => {
            if (particle && particle.parentNode) {
              particle.parentNode.removeChild(particle);
            }
          }, 2000);
        }
        
        burstCount++;
        console.log(`🎆 Birthday firework burst ${burstCount}/${maxBursts}!`);
        if (burstCount < maxBursts) {
          setTimeout(createBirthdayFirework, 800);

      const centerText = birthdayLoader.querySelector('.birthday-center-text');
      setTimeout(() => {
        centerText.classList.add('show');

      const birthdayEmojiElements = birthdayLoader.querySelectorAll('.birthday-emoji');
      birthdayEmojiElements.forEach((emoji, index) => {
        setTimeout(() => {

    function checkHolidayStatus() {
      const today = new Date();
      const currentDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      
      let statusMessage = `🎯 Holiday Status (${currentDate})\n`;
      statusMessage += '═══════════════════════\n';
      
      // Show unlock status
      if (isAnimationUnlocked) {
        statusMessage += '🔓 UNLOCKED MODE\n';
      } else {
        statusMessage += '🔒 DATE-BASED MODE\n';
      }
      
      // Comprehensive list of all holiday events
      const holidayIds = ['easter', 'spring', 'summer', 'backToSchool', 'halloween', 'thanksgiving', 'christmas', 'newyear', 'chinesenewyear', 'birthday'];
      
      // Check if EVENTS object exists
      if (typeof EVENTS === 'undefined' || !EVENTS) {
        statusMessage += '\n❌ ERROR: Events data not loaded!';
        alert(statusMessage);
        return;
      }
      
      // Check if isHolidayActive function exists
      if (typeof isHolidayActive === 'undefined') {
        statusMessage += '\n❌ ERROR: isHolidayActive function not available!';
        alert(statusMessage);
        return;
      }
      
      let foundEvents = 0;
      let activeEvents = 0;
      let missingEvents = [];
      
      statusMessage += `\nChecking ${holidayIds.length} holidays:\n`;
      statusMessage += '─────────────────────────\n';
      
      holidayIds.forEach(holidayId => {
        const event = EVENTS[holidayId];
        if (event && event.name && event.period) {
          foundEvents++;
          let isActive = false;
          let errorOccurred = false;
          
          try {
            isActive = isHolidayActive(holidayId);
            if (isActive) activeEvents++;
          } catch (error) {
            console.error(`Error checking holiday status for ${holidayId}:`, error);
            errorOccurred = true;
          }
          
          if (!errorOccurred) {
            const canRun = isAnimationUnlocked || isActive;
            const status = canRun ? (isActive ? '✅' : '🔓') : '❌';
            statusMessage += `${status} ${event.name}\n`;
          } else {
            statusMessage += `⚠️ ${event.name} (Error)\n`;
          }
        } else {
          missingEvents.push(holidayId);
        }
      });
      
      // Summary
      statusMessage += '─────────────────────────\n';
      statusMessage += `📊 Total: ${foundEvents}/${holidayIds.length} events\n`;
      statusMessage += `🟢 Active: ${activeEvents} holidays\n`;
      
      if (missingEvents.length > 0) {
        statusMessage += `❌ Missing: ${missingEvents.join(', ')}\n`;
      }
      
      if (isAnimationUnlocked) {
        statusMessage += '\n💡 Manual unlock active!';
      } else {
        statusMessage += '\n🎯 Use "Unlock Animations" to override!';
      }
      
      alert(statusMessage);
    }
